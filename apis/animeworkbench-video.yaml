name: animeworkbench-video
provider: animeworkbench
baseUrl: https://animeworkbench-pre.lingjingai.cn
authType: bearer
authFile: ~/.animeworkbench_auth.json
endpoints:
  submit:
    method: POST
    path: /api/material/creation/videoCreate
  poll:
    method: GET
    path: /api/material/creation/videoCreateGet
  statusField: data.taskStatus
  resultField: data.resultFileList
  externalIdField: data
statusMapping:
  pending: [WAITING]
  processing: [SENDED, PROCESSING]
  completed: [SUCCESS]
  failed: [FAIL]
polling:
  intervalMs: 10000
  maxWaitMs: 1200000
rateLimit:
  maxConcurrent: 2
  delayMs: 2000
