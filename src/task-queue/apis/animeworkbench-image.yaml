name: animeworkbench-image
provider: animeworkbench
baseUrl: https://animeworkbench-pre.lingjingai.cn
authType: bearer
authFile: ~/.animeworkbench_auth.json
endpoints:
  submit:
    method: POST
    path: /creation/imageCreate
  poll:
    method: GET
    path: /creation/imageCreateGet
  statusField: data.taskStatus
  resultField: data.resultFileList
  externalIdField: data
statusMapping:
  pending: [WAITING]
  processing: [SENDED, PROCESSING]
  completed: [SUCCESS]
  failed: [FAIL]
polling:
  intervalMs: 5000
  maxWaitMs: 600000
rateLimit:
  maxConcurrent: 3
  delayMs: 1000
